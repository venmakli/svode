<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Svode</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #fff;
      }

      .svode-initial-loader {
        box-sizing: border-box;
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        padding-top: 44px;
      }

      .svode-initial-loader img {
        width: 48px;
        height: 48px;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body,
        #root {
          background: #261f1c;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="svode-initial-loader">
        <img src="/logo.png" alt="" aria-hidden="true" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
