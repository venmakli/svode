name: build-installers

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to build
        required: true
        default: main
        type: string
      platform:
        description: Installer platform to build
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - linux
          - all
      notify:
        description: Update dogfood notification feed
        required: true
        default: false
        type: boolean
      notice_reason:
        description: Short reason shown to dogfood users
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-installers-${{ github.event.inputs.platform }}-${{ github.event.inputs.ref }}
  cancel-in-progress: true

jobs:
  select-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          windows='{"include":[{"platform":"windows-latest","feed_platform":"windows","args":"--bundles nsis","artifact_name":"Svode-windows-nsis","artifact_path":"apps/desktop/src-tauri/target/release/bundle/nsis/*.exe"}]}'
          macos='{"include":[{"platform":"macos-latest","feed_platform":"darwin","args":"--target universal-apple-darwin --bundles dmg","artifact_name":"Svode-macos-dmg","artifact_path":"apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg"}]}'
          linux='{"include":[{"platform":"ubuntu-22.04","feed_platform":"linux","args":"--bundles deb","artifact_name":"Svode-linux-deb","artifact_path":"apps/desktop/src-tauri/target/release/bundle/deb/*.deb"}]}'
          all='{"include":[{"platform":"macos-latest","feed_platform":"darwin","args":"--target universal-apple-darwin --bundles dmg","artifact_name":"Svode-macos-dmg","artifact_path":"apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg"},{"platform":"ubuntu-22.04","feed_platform":"linux","args":"--bundles deb","artifact_name":"Svode-linux-deb","artifact_path":"apps/desktop/src-tauri/target/release/bundle/deb/*.deb"},{"platform":"windows-latest","feed_platform":"windows","args":"--bundles nsis","artifact_name":"Svode-windows-nsis","artifact_path":"apps/desktop/src-tauri/target/release/bundle/nsis/*.exe"}]}'

          case "${{ inputs.platform }}" in
            windows) matrix="$windows" ;;
            macos) matrix="$macos" ;;
            linux) matrix="$linux" ;;
            all) matrix="$all" ;;
            *) echo "Unsupported platform: ${{ inputs.platform }}" >&2; exit 1 ;;
          esac

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: select-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve build metadata
        id: build_meta
        shell: bash
        run: |
          sha="$(git rev-parse HEAD)"
          version="$(node -e "console.log(JSON.parse(require('fs').readFileSync('apps/desktop/package.json', 'utf8')).version)")"

          {
            echo "sha=$sha"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.platform != 'macos-latest'

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.platform == 'macos-latest'
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installer
        env:
          VITE_SVODE_BUILD_COMMIT: ${{ steps.build_meta.outputs.sha }}
        run: bun run --cwd apps/desktop tauri build ${{ matrix.args }}

      - name: Upload installer artifact
        id: upload_installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 3

      - name: Prepare dogfood feed metadata
        if: ${{ inputs.notify }}
        id: feed_meta
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const now = new Date();
          const expires = new Date(now.getTime() + 3 * 24 * 60 * 60 * 1000);
          console.log(`published_at=${now.toISOString()}`);
          console.log(`expires_at=${expires.toISOString()}`);
          NODE

      - name: Update dogfood feed
        if: ${{ inputs.notify }}
        env:
          UPDATE_KIND: ci-build
          UPDATE_VERSION: ${{ steps.build_meta.outputs.version }}
          UPDATE_COMMIT: ${{ steps.build_meta.outputs.sha }}
          UPDATE_SOURCE_REF: ${{ inputs.ref }}
          UPDATE_RUN_ID: ${{ github.run_id }}
          UPDATE_PLATFORM: ${{ matrix.feed_platform }}
          UPDATE_ARTIFACT_NAME: ${{ matrix.artifact_name }}
          UPDATE_URL: ${{ steps.upload_installer.outputs.artifact-url }}
          UPDATE_FALLBACK_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          UPDATE_REASON: ${{ inputs.notice_reason }}
          UPDATE_PUBLISHED_AT: ${{ steps.feed_meta.outputs.published_at }}
          UPDATE_EXPIRES_AT: ${{ steps.feed_meta.outputs.expires_at }}
        run: node scripts/update-dogfood-feed.mjs
