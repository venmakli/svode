name: build-installers

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to build
        required: true
        default: main
        type: string
      platform:
        description: Installer platform to build
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - linux
          - all

permissions:
  contents: read

jobs:
  select-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          windows='{"include":[{"platform":"windows-latest","args":"--bundles nsis","artifact_name":"Svode-windows-nsis","artifact_path":"apps/desktop/src-tauri/target/release/bundle/nsis/*.exe"}]}'
          macos='{"include":[{"platform":"macos-latest","args":"--target universal-apple-darwin --bundles dmg","artifact_name":"Svode-macos-dmg","artifact_path":"apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg"}]}'
          linux='{"include":[{"platform":"ubuntu-22.04","args":"--bundles deb","artifact_name":"Svode-linux-deb","artifact_path":"apps/desktop/src-tauri/target/release/bundle/deb/*.deb"}]}'
          all='{"include":[{"platform":"macos-latest","args":"--target universal-apple-darwin --bundles dmg","artifact_name":"Svode-macos-dmg","artifact_path":"apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg"},{"platform":"ubuntu-22.04","args":"--bundles deb","artifact_name":"Svode-linux-deb","artifact_path":"apps/desktop/src-tauri/target/release/bundle/deb/*.deb"},{"platform":"windows-latest","args":"--bundles nsis","artifact_name":"Svode-windows-nsis","artifact_path":"apps/desktop/src-tauri/target/release/bundle/nsis/*.exe"}]}'

          case "${{ inputs.platform }}" in
            windows) matrix="$windows" ;;
            macos) matrix="$macos" ;;
            linux) matrix="$linux" ;;
            all) matrix="$all" ;;
            *) echo "Unsupported platform: ${{ inputs.platform }}" >&2; exit 1 ;;
          esac

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: select-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.platform != 'macos-latest'

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.platform == 'macos-latest'
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installer
        run: bun run --cwd apps/desktop tauri build ${{ matrix.args }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
