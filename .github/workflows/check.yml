name: check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --cwd apps/desktop typecheck

  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsecret-1-dev
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --cwd apps/desktop build:sidecars
      - run: cargo check --manifest-path=apps/desktop/src-tauri/Cargo.toml
      - name: Clippy
        run: |
          cargo clippy --manifest-path=apps/desktop/src-tauri/Cargo.toml -- \
            -D warnings \
            -A clippy::collapsible_if \
            -A clippy::type_complexity \
            -A clippy::too_many_arguments \
            -A clippy::needless_return \
            -A clippy::collapsible_str_replace \
            -A clippy::question_mark \
            -A clippy::cloned_ref_to_slice_refs \
            -A clippy::ptr_arg \
            -A clippy::redundant_pattern_matching \
            -A clippy::manual_contains \
            -A clippy::needless_lifetimes \
            -A clippy::derivable_impls

  audit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/audit@v1
        with:
          workingDirectory: apps/desktop/src-tauri
          createIssues: false
